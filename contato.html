<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="imgs/CrystalGalaxy.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;1,14..32,300&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="css/style.css">

</head>
<body class="fundo">
    <header>

        <a href="index.html" title="Home" alt="Home">
            <img src="imgs/CrystalGalaxy.png" alt="Nome do Jogo" class="logo">
        </a>

        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="#sobre">Sobre</a>
                </li>
                <li>
                    <a href="historia.html">Historia</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
                <li>
                    <button class="btnheader">Jogar</button>
                </li>
                <li>
                    <button onclick="alternarTema()" id="btnTema" class="btnTema">☀️</button>
                </li>
            </ul>
        </nav>
    </header>

        <section class="contato">
            <h2>Fale Comigo</h2>

            <form id="formContato">
                <label>Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Nome Completo" autocomplete="off" required>

                <label>Email:</label>
                <input type="email" name="email" id="email" placeholder="Digite um e-mail Válido" autocomplete="off" required inputmode="email">

                <label>Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>

                <button type="submit">Enviar</button>
            </form>

            <p id="reposta"></p>
        </section>

    <footer>
        <p>Site Desenvolvido por Felipe</p>
    </footer>

    <script src="index.js"></script>
</body>
</html>
