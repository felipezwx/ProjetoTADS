<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Galaxy</title>

    <link rel="icon" href="imgs/CrystalGalaxy.png">

    <link rel="stylesheet" type="text/css" href="css/style.css">

</head>
<body class="fundo">
    <header>

        <a href="index.html" title="Home" alt="Home">
            <img src="imgs/CrystalGalaxy.png" alt="Nome do Jogo" class="logo">
        </a>

        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="#sobre">Sobre</a>
                </li>
                <li>
                    <a href="#">Serviços</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
                <li>
                    <button class="btnheader">Jogar</button>
                </li>
                <li>
                    <button onclick="alternarTema()" id="btnTema" class="btnTema">☀️</button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="">
        <section class="contato">
            <h2>Fale Comigo</h2>

            <from id="formContato">
                <label>Nome:</label>
                <input type="text" id="nome" required>

                <label>Email:</label>
                <input type="email" id="email" required>

                <label>Mensagem:</label>
                <textarea id="mensagem" rows="5" required></textarea>

                <button type="submit">Enviar</button>
            </from>

            <p id="reposta"></p>
        </section>
    </main>

    <footer>
        <p>Site Desenvolvido por Felipe</p>
    </footer>


</body>
</html>
